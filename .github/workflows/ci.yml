name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ORT_VERSION: "1.24.4"

jobs:
  format-check:
    name: Format & Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include src tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-18 --dry-run --Werror

  build-linux:
    name: Linux (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: [ci-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate test fixtures
        run: uv run --with onnx --with numpy python3 tests/fixtures/generate_test_models.py

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: |
          cd build/${{ matrix.preset }}
          ctest --output-on-failure --parallel $(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-build
          path: |
            build/${{ matrix.preset }}/libgonx.so
            build/${{ matrix.preset }}/libonnxruntime*

  build-linux-sanitizers:
    name: Linux (ASan + UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate test fixtures
        run: uv run --with onnx --with numpy python3 tests/fixtures/generate_test_models.py

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test with sanitizers
        run: |
          cd build/debug
          ctest --output-on-failure --parallel $(nproc)

  build-windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate test fixtures
        run: uv run --with onnx --with numpy python3 tests/fixtures/generate_test_models.py

      - name: Configure
        run: cmake --preset ci-windows

      - name: Build
        run: cmake --build --preset ci-windows --parallel

      - name: Test
        run: |
          cd build/ci-windows
          ctest --output-on-failure --parallel $env:NUMBER_OF_PROCESSORS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            build/ci-windows/gonx.dll
            build/ci-windows/onnxruntime.dll

  build-macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ninja

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate test fixtures
        run: uv run --with onnx --with numpy python3 tests/fixtures/generate_test_models.py

      - name: Configure
        run: cmake --preset ci-macos

      - name: Build
        run: cmake --build --preset ci-macos --parallel

      - name: Test
        run: |
          cd build/ci-macos
          ctest --output-on-failure --parallel $(sysctl -n hw.ncpu)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            build/ci-macos/libgonx.dylib
            build/ci-macos/libonnxruntime*

  package:
    name: Package Addon
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble addon
        run: |
          mkdir -p dist/addons/gonx/bin

          # Copy .gdextension manifest
          cp example/addons/gonx/gonx.gdextension dist/addons/gonx/

          # Copy platform binaries
          cp artifacts/linux-x64-build/libgonx.so dist/addons/gonx/bin/ || true
          cp artifacts/linux-x64-build/libonnxruntime* dist/addons/gonx/bin/ || true
          cp artifacts/windows-x64-build/gonx.dll dist/addons/gonx/bin/ || true
          cp artifacts/windows-x64-build/onnxruntime.dll dist/addons/gonx/bin/ || true
          cp artifacts/macos-arm64-build/libgonx.dylib dist/addons/gonx/bin/ || true
          cp artifacts/macos-arm64-build/libonnxruntime* dist/addons/gonx/bin/ || true

          # Include license notices
          cp LICENSE dist/addons/gonx/ 2>/dev/null || echo "No LICENSE yet" > dist/addons/gonx/LICENSE
          echo "ONNX Runtime: MIT License (https://github.com/microsoft/onnxruntime/blob/main/LICENSE)" \
            > dist/addons/gonx/THIRD_PARTY_NOTICES.txt

          ls -lR dist/

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: gonx-addon
          path: dist/
